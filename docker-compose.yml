version: '3.8'

services:
  # 业务数据库
  postgres:
    image: postgres:14-alpine
    container_name: smartcourse-postgres
    restart: always
    environment:
      POSTGRES_DB: smartcourse
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartcourse-network

  # 向量数据库
  chromadb:
    image: chromadb/chroma:latest
    container_name: smartcourse-chroma
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ALLOW_RESET=TRUE
    networks:
      - smartcourse-network

  # 对象存储 (MinIO)
  minio:
    image: minio/minio:latest
    container_name: smartcourse-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-smartpassword}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - smartcourse-network

  # Redis (用于异步任务与缓存)
  redis:
    image: redis:7-alpine
    container_name: smartcourse-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - smartcourse-network

networks:
  smartcourse-network:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
  minio_data:
