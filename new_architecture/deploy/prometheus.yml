global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: '/metrics'

  - job_name: 'video-analyzer'
    static_configs:
      - targets: ['video-analyzer:8002']
    metrics_path: '/metrics'

  - job_name: 'knowledge-extractor'
    static_configs:
      - targets: ['knowledge-extractor:8003']
    metrics_path: '/metrics'

  - job_name: 'search-engine'
    static_configs:
      - targets: ['search-engine:8004']
    metrics_path: '/metrics'

  - job_name: 'video-analysis-worker'
    static_configs:
      - targets: ['video-analysis-worker:9108']
    metrics_path: '/metrics'
