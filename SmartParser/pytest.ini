[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 测试标记
markers =
    slow: 标记慢速测试 (deselect with '-m "not slow"')
    integration: 需要外部 API 的集成测试
    unit: 纯单元测试，不需要外部依赖
